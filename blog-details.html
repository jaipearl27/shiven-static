    <!-- Add any specific styles for blog content if needed -->
    <style>

        display: block;

      /* List styles */

      /* Heading styles */

      .blog-content-container em {

      }

      /* Code and preformatted text styles */
      .blog-content-container code {
        background-color: var(--purple-light);
        border-radius: 0.4rem;
        color: var(--black);

        padding: 0.25em 0.3em;
      }

      .blog-content-container pre {
        background: var(--black);
        border-radius: 0.5rem;
        color: var(--white);

      }

        border-left: 3px solid var(--gray-3);
        margin: 1.5rem 0;
        padding-left: 1rem;
      }

      .blog-content-container hr {
        border: none;
        border-top: 1px solid var(--gray-2);
        margin: 2rem 0;
      }

      /* Add this at the bottom of your CSS file */
      .prose {
        max-width: 800px;
        margin: 0 auto;
        padding: 1rem;
      }

      .prose :first-child {

      }

  </head>

  <body class="bg-gray-100">
    <header
      class="relative w-full py-4 px-4 shadow bg-white fixed top-0 z-50"
      id="navbar"
    >
      <!-- Navbar content loaded by index.js -->
      <p class="text-center text-gray-500">Navbar Placeholder</p>
    </header>

    <main class="pt-24 pb-16">
      <!-- Adjust pt based on navbar height -->
      <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <!-- Back Button -->
        <div class="mb-6">
          <a
            href="blogs.html"
            class="text-emerald-600 hover:text-emerald-800 inline-flex items-center"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5 mr-1"
              viewBox="0 0 20 20"
              fill="currentColor"
            >
              <path
                fill-rule="evenodd"
                d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z"
                clip-rule="evenodd"
              />
            </svg>
            Back to Blog List
          </a>
        </div>

        <article
          id="blog-article"
          class="bg-white p-6 sm:p-8 lg:p-10 rounded-lg shadow-lg"
        >
          <!-- Content will be loaded here -->
          <div id="loading-indicator" class="text-center py-10 text-gray-600">
            <i class="fas fa-spinner fa-spin mr-2 text-2xl"></i> Loading blog
            post...
          </div>
          <div id="error-display" class="text-center py-10 text-red-600 hidden">
            Error loading blog post.
          </div>

          <div id="blog-content-wrapper" class="hidden">
            <!-- Hide until loaded -->
            <!-- Meta Info -->
            <div class="mb-4 text-sm text-gray-500">
              <span id="blog-category" class="font-medium text-emerald-600"
                >Category</span
              >
              <span class="mx-2">•</span>
              <span id="blog-publish-date">Publish Date</span>
            </div>

            <!-- Title -->
            <h1
              id="blog-title"
              class="text-3xl md:text-4xl font-bold text-gray-900 mb-5"
            >
              Blog Title Placeholder
            </h1>

            <!-- Featured Image -->
            <img
              id="blog-image"
              src=""
              alt=""
              class="w-full h-auto max-h-[500px] object-cover rounded-lg mb-8 shadow-md"
            />

            <!-- Main Content -->
            <div id="blog-content-container" class="prose prose-lg max-w-none">
              <!-- The fetched HTML content goes here -->
            </div>
          </div>
        </article>
      </div>
    </main>

    <footer id="footer" class="bg-gray-800 text-white p-10">
      <p class="text-center">Footer Placeholder</p>
    </footer>

    <script>
      // Helper function to safely escape HTML (for setting text content, alt attributes etc.)
      function escapeHTML(str) {
        if (str === null || str === undefined) return "";
        return String(str)
          .replace(/&/g, "&")
          .replace(/</g, "<")
          .replace(/>/g, ">")
          .replace(/"/g, '"');
      }

      // Helper function to format date
      function formatDate(dateString) {
        if (!dateString) return "N/A";
        try {
          // More detailed format for the detail page
          const options = { year: "numeric", month: "long", day: "numeric" };
          return new Date(dateString).toLocaleDateString("en-US", options);
        } catch (e) {
          console.error("Error formatting date:", dateString, e);
          return "Invalid Date";
        }
      }

      // Function to update meta tags
      function updateMetaTags(blog) {
        const safeTitle = escapeHTML(blog.title);
        // Create a simple text description from the beginning of the content
        const tempDiv = document.createElement("div");
        tempDiv.innerHTML = blog.content || "";
        const plainTextContent = tempDiv.textContent || tempDiv.innerText || "";
        const description = escapeHTML(
          plainTextContent.substring(0, 160).replace(/\s+/g, " ").trim() + "..."
        );

        document.title = `${safeTitle} | Asset Management`;

        // Update standard description meta tag
        let metaDesc = document.querySelector('meta[name="description"]');
        if (metaDesc) metaDesc.setAttribute("content", description);
        else {
          // Add if missing
          metaDesc = document.createElement("meta");
          metaDesc.setAttribute("name", "description");
          metaDesc.setAttribute("content", description);
          document.head.appendChild(metaDesc);
        }

        // Update OG tags
        document
          .querySelector('meta[property="og:title"]')
          ?.setAttribute("content", safeTitle);
        document
          .querySelector('meta[property="og:description"]')
          ?.setAttribute("content", description);
        document
          .querySelector('meta[property="og:image"]')
          ?.setAttribute("content", escapeHTML(blog.featuredImage || "")); // Use featured image for OG
        document
          .querySelector('meta[property="og:url"]')
          ?.setAttribute("content", window.location.href);

        // Update Canonical tag
        let canonicalLink = document.querySelector('link[rel="canonical"]');
        if (canonicalLink)
          canonicalLink.setAttribute("href", window.location.href);
        else {
          // Add if missing
          canonicalLink = document.createElement("link");
          canonicalLink.setAttribute("rel", "canonical");
          canonicalLink.setAttribute("href", window.location.href);
          document.head.appendChild(canonicalLink);
        }

        // Update Twitter card tags (optional, similar to OG)
        document
          .querySelector('meta[name="twitter:title"]')
          ?.setAttribute("content", safeTitle);
        document
          .querySelector('meta[name="twitter:description"]')
          ?.setAttribute("content", description);
        document
          .querySelector('meta[name="twitter:image"]')
          ?.setAttribute("content", escapeHTML(blog.featuredImage || ""));
      }

      // Function to fetch and display blog details
      async function loadBlogDetails() {
        const urlParams = new URLSearchParams(window.location.search);
        const blogId = urlParams.get("id");

        const loadingIndicator = document.getElementById("loading-indicator");
        const errorDisplay = document.getElementById("error-display");
        const contentWrapper = document.getElementById("blog-content-wrapper");

        if (!blogId) {
          console.error("Blog ID not found in URL.");
          loadingIndicator.style.display = "none";
          errorDisplay.textContent = "Error: Blog ID is missing in the URL.";
          errorDisplay.classList.remove("hidden");
          return;
        }

        // --- IMPORTANT: Choose ONE API strategy ---

        // Strategy 1: Fetch the specific blog by ID (Requires API endpoint like /api/v1/blogs/:id)
        const apiUrl = `http://localhost:8000/api/v1/blogs/${blogId}`;

        // // Strategy 2: Fetch ALL published blogs and filter (Use if no specific endpoint exists)
        // const apiUrl = 'http://localhost:8000/api/v1/blogs/publish';

        try {
          const response = await fetch(apiUrl);

          if (!response.ok) {
            throw new Error(`HTTP error! Status: ${response.status}`);
          }

          let responseData = await response.json();

          // // If using Strategy 2 (Fetch all), filter the result:
          // if (Array.isArray(blogData)) {
          //     const foundBlog = blogData.find(blog => blog._id === blogId);
          //     if (!foundBlog) throw new Error('Blog post not found in the published list.');
          //     blogData = foundBlog; // Use the found blog data
          // } else if (!blogData || typeof blogData !== 'object' || !blogData._id) {
          //      // Basic validation if fetching single (Strategy 1)
          //      throw new Error('Invalid blog data received from API.');
          // }
          let blogData = responseData?.data; // Adjust based on your API response structure

          console.log(blogData);
          // --- Populate the page ---
          if (!blogData || typeof blogData !== "object" || !blogData._id) {
            // Basic validation (adjust if API returns data nested, e.g., result.data)
            throw new Error("Invalid blog data received from API.");
          }

          document.getElementById("blog-category").textContent = escapeHTML(
            blogData.category || "Uncategorized"
          );
          document.getElementById("blog-publish-date").textContent = formatDate(
            blogData.publishedAt
          );
          document.getElementById("blog-title").textContent = escapeHTML(
            blogData.title
          );

          const imgElement = document.getElementById("blog-image");
          imgElement.src = escapeHTML(blogData.featuredImage || "");
          imgElement.alt = escapeHTML(blogData.title || "Blog post image");
          if (!blogData.featuredImage) {
            imgElement.style.display = "none"; // Hide image if no URL
          }

          // Set the HTML content safely
          // WARNING: Only use innerHTML if you TRUST the source of blogData.content.
          // If the content comes from user input via a WYSIWYG editor stored in your DB,
          // ensure it's properly sanitized server-side before saving to prevent XSS attacks.
          document.getElementById("blog-content-container").innerHTML =
            blogData.content || "<p>Content not available.</p>";

          // Update Meta Tags for SEO and Sharing
          updateMetaTags(blogData);

          // Show content, hide loading/error
          loadingIndicator.style.display = "none";
          errorDisplay.classList.add("hidden");
          contentWrapper.classList.remove("hidden");
        } catch (error) {
          console.error("Error fetching blog details:", error);
          loadingIndicator.style.display = "none";
          errorDisplay.textContent = `Error loading blog post: ${error.message}`;
          errorDisplay.classList.remove("hidden");
          contentWrapper.classList.add("hidden");
        }
      }

      // Load common elements and then blog details
      document.addEventListener("DOMContentLoaded", () => {
        if (typeof loadCommonElements === "function") {
          loadCommonElements()
            .then(() => {
              loadBlogDetails();
            })
            .catch((err) => {
              console.error("Error loading common elements:", err);
              loadBlogDetails();
            });
        } else {
          loadBlogDetails();
        }
      });
    </script>
    <!-- Link to your existing index.js if it handles navbar/footer/mobile menu -->
    <script src="./js/index.js"></script>
  </body>
</html>
