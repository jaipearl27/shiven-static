    <!-- JavaScript -->
    <script>
        // Initialize AOS
        AOS.init({
            duration: 800, // Animation duration
            once: true    // Only animate once
        });

        // --- Helper Functions ---

        // Function to safely escape HTML to prevent XSS
        function escapeHTML(str) {
            if (str === null || str === undefined) return '';
            return String(str)
                .replace(/&/g, '&')
                .replace(/</g, '<')
                .replace(/>/g, '>')
                .replace(/"/g, '"')
        }

        // Function to format bytes into KB, MB, GB etc.
        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0 || typeof bytes !== 'number' || isNaN(bytes)) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB', 'PB', 'EB', 'ZB', 'YB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        // Function to create a feature list item with check/cross icon
        function createFeatureListItem(label, included) {
            const iconClass = included
                ? "fas fa-check text-emerald-500" // Check icon - green
                : "fas fa-times text-red-500";    // Cross icon - red
            const textClass = included ? "" : "text-gray-500"; // Optional: Dim text if not included

            return `
                <li class="flex items-start py-1">
                    <i class="${iconClass} mr-3 mt-1 flex-shrink-0 w-4 text-center"></i>
                    <span class="${textClass}">${escapeHTML(label)}</span>
                </li>
            `;
        }

        // --- Core Plan Rendering ---

        // Function to create HTML for a single plan card based on the NEW API structure
        function createPlanHTML(plan) {
            // Validate input
            if (!plan || typeof plan !== 'object') {
                console.warn('Invalid plan data received:', plan);
                return ''; // Return empty string if plan data is invalid
            }

            const planName = escapeHTML(plan.name || 'Unnamed Plan');

            // Price Formatting
            let priceDisplay = 'Contact Us'; // Default if amount is missing or invalid
            const billingCycle = '<span class="text-base font-normal text-gray-500">/mo</span>'; // Assuming monthly
            if (typeof plan.amount === 'number' && !isNaN(plan.amount)) {
                 priceDisplay = `₹${plan.amount.toLocaleString('en-IN')} ${billingCycle}`;
            }

            // Features List Generation
            const featuresListItems = [];

            // 1. Storage Limit
            if (typeof plan.storageLimit === 'number') {
                featuresListItems.push(`
                    <li class="flex items-start py-1">
                        <i class="fas fa-check text-emerald-500 mr-3 mt-1 flex-shrink-0 w-4 text-center"></i>
                        <span>${formatBytes(plan.storageLimit)} Storage</span>
                    </li>
                `);
            } else {
                 featuresListItems.push(createFeatureListItem('Storage', false)); // Show as unavailable if missing/invalid
            }

            // 2. Services Count
            let includedServicesCount = 0;
            if (plan.services && typeof plan.services === 'object') {
                includedServicesCount = Object.values(plan.services).filter(included => included === true).length;
            }
            featuresListItems.push(`
                <li class="flex items-start py-1">
                    <i class="fas fa-check text-emerald-500 mr-3 mt-1 flex-shrink-0 w-4 text-center"></i>
                    <span>${includedServicesCount} Included Services</span>
                </li>
            `);


            // 3. Boolean Features
            featuresListItems.push(createFeatureListItem('Calculators', plan.calculators === true));
            featuresListItems.push(createFeatureListItem('Cash Register', plan.cashRegister === true));
            featuresListItems.push(createFeatureListItem('WhatsApp Notifications', plan.whatsappNotifications === true));

            const featuresHTML = featuresListItems.join('');

            // Button Configuration (Using default text for now)
            const buttonText = typeof plan.amount === 'number' ? 'Get Started' : 'Contact Us';
            const buttonLink = 'https://app.assetmanagment.in'; // Replace with actual links if available, e.g., plan.purchaseLink

            // Description (Optional - Placeholder)
            // You can customize this, maybe include a short summary if needed
            const description = escapeHTML(plan.description || `Ideal for advisors needing core features and up to ${formatBytes(plan.storageLimit || 0)} storage.`);


            // Assemble the card HTML
            // Added 'flex flex-col h-full' to the outer div and 'flex-grow' to the content area for equal height
            return `
                <div class="bg-white p-6 rounded-xl shadow-lg hover:shadow-xl transition-shadow duration-300 flex flex-col h-full border border-gray-200" data-aos="fade-up">
                    <div class="flex-grow">
                        <h2 class="text-2xl font-semibold mb-2 text-gray-800">${planName}</h2>
                        <p class="text-sm text-gray-500 mb-4 min-h-[3em]">${description}</p>
                        <div class="text-3xl font-bold mb-5 text-gray-900">${priceDisplay}</div>

                        <a href="${buttonLink}" class="inline-block bg-orange-500 hover:bg-orange-600 text-white font-medium py-2.5 px-8 rounded-md transition-colors duration-200 w-full text-center mb-6 shadow-sm hover:shadow-md">
                            ${buttonText}
                        </a>

                        <h3 class="text-sm font-semibold text-gray-500 uppercase mb-3 mt-2">Features Include:</h3>
                        <ul class="space-y-1 text-gray-700">
                            ${featuresHTML}
                        </ul>
                    </div>
                </div>
            `;
        }

        // --- Data Fetching and Rendering ---

        async function loadPlans() {
            const plansContainer = document.getElementById('plans-container');
            const loadingIndicator = document.getElementById('loading-indicator');
            // Make sure this matches your actual API endpoint
            const apiUrl = 'http://localhost:8000/api/v1/plans';

            try {
                const response = await fetch(apiUrl);

                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status} ${response.statusText}`);
                }

                const result = await response.json(); // Assuming API directly returns the array of plans or { success: true, data: [...] }

                let plans = [];
                // Adapt based on your actual API response structure:
                if (Array.isArray(result)) { // Case 1: API returns array directly
                    plans = result;
                } else if (result && result.success && Array.isArray(result.data)) { // Case 2: API returns { success: true, data: [...] }
                    plans = result.data;
                } else {
                     throw new Error('Invalid API response format. Expected an array of plans.');
                }

                // Clear loading indicator
                if (loadingIndicator) loadingIndicator.remove();
                plansContainer.innerHTML = ''; // Clear any static content

                if (plans.length === 0) {
                    plansContainer.innerHTML = '<p class="text-center col-span-full text-gray-600">No subscription plans available at the moment.</p>';
                    return;
                }

                // Generate and append HTML for each plan
                plans.forEach(plan => {
                    const planHTML = createPlanHTML(plan);
                    if (planHTML) { // Only append if HTML was generated successfully
                      plansContainer.insertAdjacentHTML('beforeend', planHTML);
                    }
                });

                // Refresh AOS *after* content is added and rendered
                setTimeout(() => {
                    AOS.refresh();
                }, 150); // Increased delay slightly just in case

            } catch (error) {
                console.error('Error fetching or rendering plans:', error);
                if (loadingIndicator) loadingIndicator.remove();
                 // Display a more user-friendly error message
                plansContainer.innerHTML = `
                    <div class="col-span-full text-center bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative" role="alert">
                        <strong class="font-bold">Oops!</strong>
                        <span class="block sm:inline">Could not load subscription plans. Please check your connection or try again later.</span>
                        <p class="text-sm text-red-600 mt-1">Details: ${escapeHTML(error.message)}</p>
                    </div>`;
            }
        }

        // --- Initialization ---

        document.addEventListener('DOMContentLoaded', () => {
             // Assuming index.js might handle navbar/footer loading asynchronously
             // You might need to adjust this based on how index.js works
             const loadCommons = new Promise((resolve) => {
                 // If index.js has a callback or returns a promise for when it's done:
                 if (typeof loadCommonElements === 'function') {
                     loadCommonElements().then(resolve).catch(resolve); // Resolve even if common fails
                 } else {
                     resolve(); // Assume common elements are loaded synchronously or not managed here
                 }
             });

             loadCommons.then(() => {
                loadPlans(); // Load plans after common elements attempt to load
             });

             // Make sure your existing index.js logic runs if needed
             if (typeof setupMobileMenu === 'function') {
                setupMobileMenu();
             }
             // Add other initializations from index.js if necessary
        });

    </script>
