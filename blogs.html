<body class="bg-gray-50">

    <!-- AOS Init Script -->
    <script>
        AOS.init({
            duration: 800,
            once: true
        });
    </script>

    <!-- Blog Loading Script -->
    <script>
        // Helper function to safely escape HTML
        function escapeHTML(str) {
            if (str === null || str === undefined) return '';
            return String(str)
                .replace(/&/g, '&')
                .replace(/</g, '<')
                .replace(/>/g, '>')
                .replace(/"/g, '"')
        }

        // Helper function to format date
        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            try {
                const options = { year: 'numeric', month: 'short', day: 'numeric' };
                return new Date(dateString).toLocaleDateString('en-US', options).toUpperCase();
            } catch (e) {
                console.error("Error formatting date:", dateString, e);
                return 'Invalid Date';
            }
        }

        // Function to create HTML for a single blog card
        function createBlogCardHTML(blog) {
            if (!blog || !blog._id || !blog.title || !blog.featuredImage) {
                 console.warn("Skipping blog post due to missing essential data:", blog);
                 return ''; // Don't render incomplete cards
            }

            const title = escapeHTML(blog.title);
            const imageUrl = escapeHTML(blog.featuredImage);
            const category = escapeHTML(blog.category || 'Uncategorized'); // Default category
            const publishedDate = formatDate(blog.publishedAt);
            const detailUrl = `blog-details.html?id=${blog._id}`; // Link to detail page with ID

            // Use AOS data attribute for animation on each card
            return `
                <div class="bg-white shadow-lg rounded-lg overflow-hidden flex flex-col h-full transform hover:scale-[1.02] transition-transform duration-300" data-aos="fade-up">
                    <a href="${detailUrl}" class="block">
                        <img src="${imageUrl}" alt="${title}" class="w-full h-48 object-cover">
                    </a>
                    <div class="p-5 flex flex-col flex-grow">
                        <p class="text-gray-500 text-xs font-medium mb-2">
                            ${category} <span class="text-orange-500 mx-1">•</span> ${publishedDate}
                        </p>
                        <h3 class="font-semibold text-lg mt-1 text-gray-800 mb-3 clamp-2-lines"> <!-- Clamps title to 2 lines -->
                            <a href="${detailUrl}" class="hover:text-emerald-600 transition-colors">${title}</a>
                        </h3>
                        <div class="mt-auto"> <!-- Pushes the link to the bottom -->
                            <a href="${detailUrl}" class="text-emerald-600 font-medium text-sm inline-flex items-center group">
                                READ MORE
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-1 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                  <path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3" />
                                </svg>
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }

        // Function to fetch blogs and render them
        async function loadBlogs() {
            const gridContainer = document.getElementById('blog-grid');
            const noBlogsMessage = document.getElementById('no-blogs-message');
            const errorMessage = document.getElementById('error-message');
            const apiUrl = 'http://localhost:8000/api/v1/blogs/publish'; // Your API endpoint

            // Clear previous error/no blogs messages and keep loading indicators
             errorMessage.classList.add('hidden');
             noBlogsMessage.classList.add('hidden');

            try {
                const response = await fetch(apiUrl);

                // Clear loading skeletons once fetch starts or finishes
                gridContainer.querySelectorAll('.loading-placeholder').forEach(el => el.remove());


                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }

                const blogs = await response.json(); // Assuming API returns array directly

                if (!Array.isArray(blogs)) {
                     throw new Error('Invalid API response format. Expected an array.');
                }

                if (blogs.length === 0) {
                    noBlogsMessage.classList.remove('hidden');
                    gridContainer.innerHTML = ''; // Clear just in case
                    gridContainer.appendChild(noBlogsMessage); // Append message inside grid
                    return;
                }

                // Generate and append HTML for each blog
                let blogHTML = '';
                blogs.forEach(blog => {
                    blogHTML += createBlogCardHTML(blog);
                });
                gridContainer.innerHTML = blogHTML; // Replace content efficiently

                // Refresh AOS after content is added
                setTimeout(() => {
                    AOS.refresh();
                }, 100);

            } catch (error) {
                console.error('Error fetching or rendering blogs:', error);
                 gridContainer.innerHTML = ''; // Clear grid on error
                 errorMessage.textContent = `Could not load blog posts. ${error.message}`;
                 errorMessage.classList.remove('hidden');
                 gridContainer.appendChild(errorMessage); // Append message inside grid
            }
        }

        // Load common elements (navbar, footer) and then load blogs
        document.addEventListener('DOMContentLoaded', () => {
             // Call function from index.js if it loads navbar/footer
             if (typeof loadCommonElements === 'function') {
                 loadCommonElements().then(() => {
                     loadBlogs(); // Load blogs after common elements are ready
                 }).catch(err => {
                    console.error("Error loading common elements:", err);
                    loadBlogs(); // Still try to load blogs even if common fails
                 });
             } else {
                 loadBlogs(); // If index.js doesn't handle it, load blogs directly
             }
             // Other initializations if needed
        });

    </script>
     <!-- Add clamp-lines utility to your style.css or a style block if not using a utility library that provides it -->
    <style>
        .clamp-2-lines {
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2; /* Limit to 2 lines */
            line-height: 1.4; /* Adjust line-height as needed */
            max-height: 2.8em; /* line-height * number of lines */
        }
    </style>
    <!-- Link to your existing index.js if it handles navbar/footer/mobile menu -->
    <script src="./js/index.js"></script>

</body>
